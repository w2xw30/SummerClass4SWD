<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>User Registration</h1>
    <form action="">
      <fieldset>
        <legend>Personal Details</legend>
        <div><label>First Name:</label><input type="text" /></div>
        <div><label>Last Name:</label><input type="text" /></div>
        <div><label>Age:</label><input type="number" /></div>
        <div>
          <label>Gender:</label
          ><select>
            <option selected>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div><label>Profile Picture:</label><input type="file" /></div>
      </fieldset>
      <fieldset>
        <legend>Account Details</legend>
        <div>
          <label>Email:</label><input type="email" placeholder="abc@xyz.com" />
        </div>
        <div><label>Password:</label><input type="password" /></div>
        <div>
          <label>Role:</label><input type="radio" />Admin<input
            type="radio" />User
        </div>
      </fieldset>
      <div>
        <input type="checkbox" /><span
          >I agree to the terms and conditions.</span
        >
      </div>
      <div>
        <button>Register</button>
        <button>Reset</button>
      </div>
    </form>
    <hr />
    <footer>© 2x All rights reserved.</footer>
  </body>
</html>
